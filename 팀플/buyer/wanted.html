<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나눔 요청 게시판 - Wanted</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .wanted-card { transition: all 0.2s; }
        .wanted-card:active { transform: scale(0.98); }
        .category-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body class="p-8">

    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <button onclick="location.href='screen.html'" class="hover:bg-gray-100 p-2 rounded-full transition-all">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="text-[36px] font-bold text-[#333]">나눔 요청 게시판</h1>
        </div>
        
        <button onclick="location.href='write_wanted.html'" 
            class="bg-[#0047FF] text-white px-8 py-4 rounded-[20px] flex items-center gap-3 text-[20px] font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all hover:bg-blue-700">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        물품 요청하기
    </button>
    </div>

    <div class="bg-blue-50 p-6 rounded-[24px] mb-10 flex items-center gap-4 border border-blue-100">
        <span class="text-[30px]">💡</span>
        <p class="text-blue-700 text-[18px] font-medium">
            찾으시는 물품이 없나요? 요청 게시판에 남겨주시면 이웃들이 확인 후 나눔을 시작할 수 있어요!
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="wanted-card bg-white p-8 rounded-[32px] shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full font-bold text-[14px]">급해요!</span>
                <span class="text-gray-400 text-[16px]">30분 전</span>
            </div>
            <h3 class="text-[26px] font-bold text-[#333] mb-2">전공 서적 (컴퓨터 공학)</h3>
            <p class="text-gray-500 text-[18px] mb-6 leading-relaxed">
                자료구조나 알고리즘 관련 전공 서적 구합니다. 상태 상관없이 공부용으로 필요해요!
            </p>
            <div class="flex justify-between items-center border-t pt-6">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-[20px]">👤</div>
                    <span class="font-bold text-gray-700">익명요청자</span>
                </div>
                <button class="text-[#0047FF] font-bold text-[18px] border-2 border-[#0047FF] px-6 py-2 rounded-xl">나눔해주기</button>
            </div>
        </div>

        <div class="wanted-card bg-white p-8 rounded-[32px] shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-green-100 text-green-600 px-4 py-1 rounded-full font-bold text-[14px]">기다려요</span>
                <span class="text-gray-400 text-[16px]">2시간 전</span>
            </div>
            <h3 class="text-[26px] font-bold text-[#333] mb-2">아이 유모차</h3>
            <p class="text-gray-500 text-[18px] mb-6 leading-relaxed">
                둘째가 태어나서 유모차가 하나 더 필요하게 되었습니다. 나눔 주시면 감사히 잘 쓰겠습니다.
            </p>
            <div class="flex justify-between items-center border-t pt-6">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-[20px]">👶</div>
                    <span class="font-bold text-gray-700">초보맘</span>
                </div>
                <button class="text-[#0047FF] font-bold text-[18px] border-2 border-[#0047FF] px-6 py-2 rounded-xl">나눔해주기</button>
            </div>
        </div>

        <div class="wanted-card bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 opacity-80">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-gray-100 text-gray-500 px-4 py-1 rounded-full font-bold text-[14px]">나눔 완료</span>
                <span class="text-gray-400 text-[16px]">어제</span>
            </div>
            <h3 class="text-[26px] font-bold text-[#333] mb-2">안쓰시는 멀티탭</h3>
            <p class="text-gray-500 text-[18px] mb-6 leading-relaxed">
                방 구조를 옮기는데 멀티탭이 부족하네요. 3구 이상이면 좋겠습니다!
            </p>
            <div class="flex justify-between items-center border-t pt-6">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gray-100 rounded-full"></div>
                    <span class="font-bold text-gray-400">자취생A</span>
                </div>
                <span class="bg-gray-100 text-gray-400 px-6 py-2 rounded-xl font-bold">매칭 완료</span>
            </div>
        </div>

    </div>

</body>
</html>
