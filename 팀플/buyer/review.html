<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후기 작성 - 나눔 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .tag-btn { transition: all 0.2s; border: 2px solid #E5E7EB; cursor: pointer; }
        .tag-btn.active { background-color: #E8EEFF; border-color: #0047FF; color: #0047FF; }
        .star-rating { font-size: 40px; color: #DDD; cursor: pointer; }
        .star-rating.active { color: #FFD700; }
    </style>
</head>
<body class="p-8 flex justify-center">

    <div class="w-full max-w-lg bg-white min-h-screen shadow-lg p-8 rounded-[40px] border border-gray-100">
        <header class="mb-10 flex items-center gap-4">
            <button onclick="history.back()" class="p-2 bg-gray-100 rounded-full">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1 class="text-2xl font-bold text-gray-900">나눔 후기 남기기</h1>
        </header>

        <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl mb-10">
            <div class="w-16 h-16 bg-gray-200 rounded-xl overflow-hidden">
                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=200" class="w-full h-full object-cover">
            </div>
            <div>
                <p class="text-sm text-gray-500 font-bold">고성능 노트북</p>
                <p class="text-gray-800 font-medium">기부자: <span class="text-[#0047FF]">김나눔님</span></p>
            </div>
        </div>

        <section class="text-center mb-10">
            <h3 class="text-lg font-bold text-gray-700 mb-4">이번 나눔은 어떠셨나요?</h3>
            <div class="flex justify-center gap-2">
                <span class="star-rating" onclick="setStar(1)">★</span>
                <span class="star-rating" onclick="setStar(2)">★</span>
                <span class="star-rating" onclick="setStar(3)">★</span>
                <span class="star-rating" onclick="setStar(4)">★</span>
                <span class="star-rating" onclick="setStar(5)">★</span>
            </div>
            <p id="star-text" class="text-sm text-gray-400 mt-2 font-medium">별점을 선택해주세요</p>
        </section>

        <section class="mb-10">
            <h3 class="text-lg font-bold text-gray-700 mb-4">어떤 점이 좋았나요? (중복 선택)</h3>
            <div class="flex flex-wrap gap-2">
                <button onclick="this.classList.toggle('active')" class="tag-btn px-4 py-2 rounded-full font-bold text-gray-500">🎁 물품 상태가 좋아요</button>
                <button onclick="this.classList.toggle('active')" class="tag-btn px-4 py-2 rounded-full font-bold text-gray-500">⏰ 시간 약속을 잘 지켜요</button>
                <button onclick="this.classList.toggle('active')" class="tag-btn px-4 py-2 rounded-full font-bold text-gray-500">💬 응답이 빨라요</button>
                <button onclick="this.classList.toggle('active')" class="tag-btn px-4 py-2 rounded-full font-bold text-gray-500">😊 친절하고 매너있어요</button>
            </div>
        </section>

        <section class="mb-10">
            <label class="block text-lg font-bold text-gray-700 mb-4 font-bold">감사 인사 남기기</label>
            <textarea class="w-full bg-gray-50 rounded-2xl p-5 h-32 outline-none focus:ring-2 focus:ring-[#0047FF] transition-all" placeholder="기부자님께 전할 따뜻한 한마디를 적어주세요."></textarea>
        </section>

        <button onclick="submitReview()" class="w-full bg-[#0047FF] text-white py-5 rounded-[24px] text-xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">
            후기 등록 완료
        </button>
    </div>

    <script>
        function setStar(count) {
            const stars = document.querySelectorAll('.star-rating');
            const starText = document.getElementById('star-text');
            const messages = ["", "아쉬워요 😞", "그냥 그래요 😐", "보통이에요 🙂", "좋아요! 😊", "최고예요! 😍"];
            
            stars.forEach((star, index) => {
                if(index < count) star.classList.add('active');
                else star.classList.remove('active');
            });
            starText.innerText = messages[count];
            starText.classList.add('text-[#0047FF]');
        }

        function submitReview() {
            alert('따뜻한 후기가 전달되었습니다! 나눔 온도가 올라갑니다. 🔥');
            location.href = 'mypage_buyer.html';
        }
    </script>

</body>
</html>
