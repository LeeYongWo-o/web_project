<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나눔 플랫폼 - 마이페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .menu-card { transition: all 0.2s; border: 1px solid #E5E7EB; }
        .menu-card:active { transform: scale(0.98); background-color: #F3F4F6; }
    </style>
</head>
<body class="p-8">

   <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <button onclick="location.href='../screen.html'" class="hover:bg-gray-100 p-2 rounded-full transition-all">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="text-[36px] font-bold text-[#333]">마이페이지</h1>
        </div>
        
        <button onclick="location.href='main.html'" 
                class="bg-[#6C757D] text-white px-6 py-3 rounded-xl flex items-center gap-2 text-[18px] font-bold active:scale-95 transition-all shadow-sm">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            로그아웃
        </button>
    </div>

  <div class="bg-white rounded-[40px] p-10 shadow-sm border border-gray-100 mb-10 flex items-center gap-8">
    <div class="w-32 h-32 bg-[#E9F0FF] rounded-full flex items-center justify-center">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
    </div>
    <div>
        <div class="flex items-center gap-3 mb-2">
            <span class="text-[32px] font-bold text-[#333]">1111 님</span>
            <span class="bg-[#E9F0FF] text-[#0047FF] text-[16px] px-4 py-1 rounded-full font-bold">수요자</span>
        </div>
        <p class="text-[20px] text-gray-400">서울시 강남구 · 010-1234-5678</p>
    </div>
    
    <button onclick="location.href='buyeredit.html'" 
            class="ml-auto bg-gray-50 text-gray-600 px-6 py-3 rounded-2xl font-bold border border-gray-200 hover:bg-gray-100 active:scale-95 transition-all">
        정보 수정
    </button>
</div>

    <div class="grid grid-cols-2 gap-8 mb-10">
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-2">
            <span class="text-gray-400 text-[20px] font-medium">나의 나눔 온도</span>
            <span class="text-[40px] font-bold text-[#FF4D4D]">36.5°C</span>
        </div>
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-2">
            <span class="text-gray-400 text-[20px] font-medium">받은 나눔</span>
            <span class="text-[40px] font-bold text-[#0047FF]">12건</span>
        </div>
    </div>

    <div class="space-y-4">
        <button onclick="location.href='wishlist.html'" class="menu-card w-full bg-white p-8 rounded-[28px] flex justify-between items-center">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-[#333]">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </div>
                <span class="text-[24px] font-bold text-[#333]">관심 목록</span>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

        <button onclick="location.href='history.html'" class="menu-card w-full bg-white p-8 rounded-[28px] flex justify-between items-center">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-[#333]">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <span class="text-[24px] font-bold text-[#333]">나눔 이용 내역</span>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

        <button onclick="location.href='setting_buyer.html'" class="menu-card w-full bg-white p-8 rounded-[28px] flex justify-between items-center">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-[#333]">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </div>
                <span class="text-[24px] font-bold text-[#333]">환경 설정</span>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

</body>
</html>
