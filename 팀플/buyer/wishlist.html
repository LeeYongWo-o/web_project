<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나눔 플랫폼 - 관심 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .wish-card { transition: all 0.2s; }
        .wish-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-8">

    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <button onclick="location.href='mypage_buyer.html'" class="hover:bg-gray-100 p-2 rounded-full transition-all">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="text-[36px] font-bold text-[#333]">관심 목록</h1>
        </div>
        <span class="text-[20px] text-[#0047FF] font-bold">전체 3개</span>
    </div>

    <div class="space-y-6">
        
        <div class="wish-card bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 flex items-center gap-6">
            <div class="w-32 h-32 bg-gray-100 rounded-[24px] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[#0047FF] text-[16px] font-bold mb-1 block">디지털/가전</span>
                        <h3 class="text-[24px] font-bold text-[#333]">빈티지 필름 카메라</h3>
                        <p class="text-gray-400 text-[18px]">서울시 강남구 · 2분 전</p>
                    </div>
                    <button class="p-2">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="#FF4D4D" stroke="#FF4D4D" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="wish-card bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 flex items-center gap-6">
            <div class="w-32 h-32 bg-gray-100 rounded-[24px] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[#0047FF] text-[16px] font-bold mb-1 block">노트북/PC</span>
                        <h3 class="text-[24px] font-bold text-[#333]">고성능 노트북</h3>
                        <p class="text-gray-400 text-[18px]">서울시 서초구 · 12분 전</p>
                    </div>
                    <button class="p-2">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="#FF4D4D" stroke="#FF4D4D" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="wish-card bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 flex items-center gap-6 opacity-60">
            <div class="w-32 h-32 bg-gray-100 rounded-[24px] flex items-center justify-center relative">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white font-bold">나눔 완료</div>
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-gray-400 text-[16px] font-bold mb-1 block">패션/의류</span>
                        <h3 class="text-[24px] font-bold text-[#999]">빨간색 운동화</h3>
                        <p class="text-gray-400 text-[18px]">나눔이 종료된 물품입니다.</p>
                    </div>
                    <button class="p-2">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="#CCC" stroke="#CCC" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
