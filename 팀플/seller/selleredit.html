<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F8F9FA; letter-spacing: -0.05em; }
        .input-group { margin-bottom: 1.5rem; }
        .label-text { display: block; font-size: 14px; font-weight: 700; color: #666; margin-left: 4px; margin-bottom: 8px; }
        .input-field { width: 100%; background: white; border: 2px solid #E5E7EB; border-radius: 16px; padding: 16px; font-size: 18px; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #00C896; box-shadow: 0 0 0 4px rgba(0, 200, 150, 0.05); }
    </style>
</head>
<body class="p-6 flex justify-center">
    <div class="w-full max-w-lg bg-white min-h-screen shadow-sm p-8 rounded-[40px] border border-gray-100">
        <header class="mb-10 flex items-center gap-4">
    <button onclick="location.href='mypage_seller.html'" class="p-2 hover:bg-gray-100 rounded-full transition-colors group">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </button>
    <h1 class="text-2xl font-bold text-gray-900">개인정보 수정</h1>
</header>

        <form class="space-y-2">
            <div class="input-group">
                <label class="label-text">기부자 성명</label>
                <input type="text" value="김나눔" class="input-field" placeholder="실명을 입력하세요">
            </div>

            <div class="input-group">
                <label class="label-text">생년월일</label>
                <input type="date" value="1988-12-25" class="input-field">
            </div>

            <div class="input-group">
                <label class="label-text">연락처</label>
                <div class="flex gap-2">
                    <input type="tel" value="010-9876-5432" class="input-field flex-1">
                    <button type="button" class="bg-gray-100 px-4 rounded-xl text-sm font-bold text-gray-500 shrink-0">번호변경</button>
                </div>
            </div>

            <div class="input-group">
                <label class="label-text">이메일 (기부 영수증 발송용)</label>
                <input type="email" value="donor_kim@example.com" class="input-field">
            </div>

            <div class="input-group">
                <label class="label-text">비밀번호 변경</label>
                <input type="password" class="input-field" placeholder="••••••••">
            </div>

            <div class="pt-6">
                <button type="button" onclick="alert('기부자님의 정보가 안전하게 변경되었습니다.')" class="w-full bg-[#00C896] text-white py-5 rounded-2xl text-xl font-bold shadow-lg shadow-green-100 active:scale-[0.98] transition-transform">
                    변경사항 저장하기
                </button>
            </div>
        </form>
    </div>
</body>
</html>
