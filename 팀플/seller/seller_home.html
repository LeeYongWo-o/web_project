<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기부자 홈 - 선택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .card-shadow { box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-10">

    <div class="text-center mb-20">
        <h1 class="text-[52px] font-bold text-[#333] mb-4">반갑습니다, 기부자님!</h1>
        <p class="text-[28px] text-gray-400">원하시는 활동을 선택해주세요</p>
    </div>

    <div class="flex gap-12 w-full max-w-[1100px] justify-center">
        <button onclick="location.href='input.html'" class="bg-white w-[500px] py-24 rounded-[48px] card-shadow hover:scale-[1.02] transition-all flex flex-col items-center border-2 border-transparent hover:border-[#22C55E]">
            <div class="w-40 h-40 bg-[#E8F9F1] rounded-full flex items-center justify-center mb-10">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </div>
            <h2 class="text-[48px] font-bold text-[#333] mb-4">물품 등록</h2>
            <p class="text-[22px] text-gray-400">새로운 나눔 물품을<br>등록합니다</p>
        </button>

        <button onclick="location.href='mypage_seller.html'" class="bg-white w-[500px] py-24 rounded-[48px] card-shadow hover:scale-[1.02] transition-all flex flex-col items-center border-2 border-transparent hover:border-[#22C55E]">
            <div class="w-40 h-40 bg-[#F3F4F6] rounded-full flex items-center justify-center mb-10">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <h2 class="text-[48px] font-bold text-[#333] mb-4">마이페이지</h2>
            <p class="text-[22px] text-gray-400">활동 내역과 등록 물품을<br>관리합니다</p>
        </button>
    </div>

    <button onclick="location.href='../main.html'" class="mt-20 text-gray-400 text-[20px] font-medium border-b border-gray-300">로그아웃</button>

</body>
</html>
