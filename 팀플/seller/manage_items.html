<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기부자 - 등록 물품 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .item-card { transition: all 0.2s; }
        .item-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-8">

    <div class="flex items-center gap-4 mb-10">
        <button onclick="location.href='mypage_seller.html'" class="hover:bg-gray-100 p-2 rounded-full transition-all">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="text-[36px] font-bold text-[#333]">등록 물품 관리</h1>
    </div>

    <div class="space-y-6">
        
        <div class="item-card bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 flex items-center gap-6">
            <div class="w-32 h-32 bg-gray-100 rounded-[24px] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="bg-[#F0FDF4] text-[#22C55E] px-3 py-1 rounded-lg text-[14px] font-bold mb-2 inline-block">나눔 진행 중</span>
                        <h3 class="text-[24px] font-bold text-[#333]">빈티지 필름 카메라</h3>
                        <p class="text-gray-400 text-[18px]">조회 15 · 관심 3 · 2026.02.19</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-gray-50 text-gray-600 px-5 py-3 rounded-xl font-bold border border-gray-200">수정</button>
                        <button onclick="alert('나눔 완료로 변경되었습니다.')" class="bg-[#22C55E] text-white px-5 py-3 rounded-xl font-bold">나눔 완료 처리</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="item-card bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 flex items-center gap-6 opacity-60">
            <div class="w-32 h-32 bg-gray-200 rounded-[24px] flex items-center justify-center relative">
                <div class="absolute inset-0 bg-black/20 flex items-center justify-center text-white font-bold">나눔 완료</div>
                <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=300" class="w-full h-full object-cover">
            </div>
            <div class="flex-1 text-gray-400">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="bg-gray-100 text-gray-500 px-3 py-1 rounded-lg text-[14px] font-bold mb-2 inline-block">나눔 완료</span>
                        <h3 class="text-[24px] font-bold">고성능 노트북</h3>
                        <p class="text-[18px]">나눔 받은 분: 1111 님 · 2026.01.20</p>
                    </div>
                    <button class="bg-gray-100 text-gray-400 px-5 py-3 rounded-xl font-bold cursor-not-allowed">내역 삭제</button>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
