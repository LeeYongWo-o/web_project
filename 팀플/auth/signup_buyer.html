<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수요자 회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; }
        .input-focus:focus-within { border-color: #0047FF; }
    </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-[600px] rounded-[40px] shadow-sm p-12 flex flex-col">
        <button onclick="location.href='login_buyer.html'" class="mb-10 self-start hover:bg-gray-100 p-2 rounded-full transition-all">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>

        <div class="text-center mb-10">
            <h1 class="text-[42px] font-bold text-[#333] mb-2">수요자 회원가입</h1>
            <p class="text-[18px] text-gray-400">서비스 이용을 위해 정보를 입력해주세요</p>
        </div>

        <div class="space-y-6 flex-1 overflow-y-auto pr-2 max-h-[600px]">
            <div class="space-y-2">
                <label class="text-[16px] font-bold text-[#333] ml-1">이름</label>
                <input type="text" placeholder="이름을 입력하세요" class="w-full border-2 border-gray-100 rounded-[15px] px-5 py-4 outline-none focus:border-[#0047FF]">
            </div>
            <div class="space-y-2">
                <label class="text-[16px] font-bold text-[#333] ml-1">아이디</label>
                <input type="text" placeholder="아이디를 입력하세요" class="w-full border-2 border-gray-100 rounded-[15px] px-5 py-4 outline-none focus:border-[#0047FF]">
            </div>
            <div class="space-y-2">
                <label class="text-[16px] font-bold text-[#333] ml-1">비밀번호</label>
                <input type="password" placeholder="비밀번호를 입력하세요" class="w-full border-2 border-gray-100 rounded-[15px] px-5 py-4 outline-none focus:border-[#0047FF]">
            </div>
            <div class="space-y-2">
                <label class="text-[16px] font-bold text-[#333] ml-1">비밀번호 확인</label>
                <input type="password" placeholder="비밀번호를 한번 더 입력하세요" class="w-full border-2 border-gray-100 rounded-[15px] px-5 py-4 outline-none focus:border-[#0047FF]">
            </div>
            <div class="space-y-2">
                <label class="text-[16px] font-bold text-[#333] ml-1">전화번호</label>
                <input type="tel" placeholder="전화번호를 입력하세요 (- 제외)" class="w-full border-2 border-gray-100 rounded-[15px] px-5 py-4 outline-none focus:border-[#0047FF]">
            </div>
            <div class="space-y-2">
                <label class="text-[16px] font-bold text-[#333] ml-1">사는 지역</label>
                <input type="text" placeholder="예: 서울시 강남구" class="w-full border-2 border-gray-100 rounded-[15px] px-5 py-4 outline-none focus:border-[#0047FF]">
            </div>
        </div>

        <button class="w-full bg-[#0047FF] text-white py-5 rounded-[18px] text-[22px] font-bold mt-10 transition-all active:scale-[0.98]">
            가입 완료
        </button>
    </div>
</body>
</html>
