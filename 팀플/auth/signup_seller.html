<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기부자 회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { display: none; }
        .input-focus:focus-within { border-color: #22C55E; }
    </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-[600px] h-[90vh] rounded-[40px] shadow-sm p-12 flex flex-col">
        
        <button onclick="location.href='login_seller.html'" class="mb-8 self-start hover:bg-gray-100 p-2 rounded-full transition-all">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>

        <div class="text-center mb-10">
            <h1 class="text-[42px] font-bold text-[#22C55E] mb-2">기부자 회원가입</h1>
            <p class="text-[18px] text-gray-400 font-medium">나눔을 위해 정보를 입력해주세요</p>
        </div>

        <div class="space-y-6 flex-1 overflow-y-auto pr-2">
            <div class="space-y-2">
                <label class="text-[18px] font-bold text-[#333] ml-1">이름</label>
                <input type="text" placeholder="성함을 입력하세요" class="w-full border-2 border-gray-100 rounded-[20px] px-6 py-4 outline-none focus:border-[#22C55E] text-[18px]">
            </div>

            <div class="space-y-2">
                <label class="text-[18px] font-bold text-[#333] ml-1">아이디</label>
                <input type="text" placeholder="사용하실 아이디를 입력하세요" class="w-full border-2 border-gray-100 rounded-[20px] px-6 py-4 outline-none focus:border-[#22C55E] text-[18px]">
            </div>

            <div class="space-y-2">
                <label class="text-[18px] font-bold text-[#333] ml-1">비밀번호</label>
                <input type="password" placeholder="비밀번호를 입력하세요" class="w-full border-2 border-gray-100 rounded-[20px] px-6 py-4 outline-none focus:border-[#22C55E] text-[18px]">
            </div>

            <div class="space-y-2">
                <label class="text-[18px] font-bold text-[#333] ml-1">비밀번호 확인</label>
                <input type="password" placeholder="비밀번호를 다시 입력하세요" class="w-full border-2 border-gray-100 rounded-[20px] px-6 py-4 outline-none focus:border-[#22C55E] text-[18px]">
            </div>

            <div class="space-y-2">
                <label class="text-[18px] font-bold text-[#333] ml-1">전화번호</label>
                <input type="tel" placeholder="010-0000-0000" class="w-full border-2 border-gray-100 rounded-[20px] px-6 py-4 outline-none focus:border-[#22C55E] text-[18px]">
            </div>

            <div class="space-y-2">
                <label class="text-[18px] font-bold text-[#333] ml-1">사는 지역</label>
                <input type="text" placeholder="거주하시는 지역을 입력하세요 (예: 서울 강남구)" class="w-full border-2 border-gray-100 rounded-[20px] px-6 py-4 outline-none focus:border-[#22C55E] text-[18px]">
            </div>
        </div>

        <button class="w-full bg-[#22C55E] text-white py-6 rounded-[24px] text-[24px] font-bold mt-10 shadow-lg active:scale-95 transition-all">
            가입 완료
        </button>
    </div>

</body>
</html>
