<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기부자 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; }
        
        .input-focus:focus-within { border-color: #22C55E; }
    </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-[600px] min-h-[800px] rounded-[40px] shadow-sm p-12 flex flex-col">
        
        <button onclick="location.href='../main.html'" class="mb-12 self-start hover:bg-gray-100 p-2 rounded-full transition-all">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </button>

        <div class="text-center mb-16">
            <h1 class="text-[42px] font-bold text-[#333] mb-2">기부자 로그인</h1>
            <p class="text-[20px] text-gray-400">아이디와 비밀번호를 입력해주세요</p>
        </div>

        <div class="space-y-8 flex-1">
            <div>
                <label class="text-[18px] font-bold text-[#333] block mb-3 ml-1">아이디</label>
                <div class="input-focus flex items-center border-2 border-gray-100 rounded-[18px] px-5 py-4 bg-white transition-all">
                    <svg class="mr-3" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" placeholder="아이디를 입력하세요" class="w-full text-[18px] outline-none placeholder:text-gray-300">
                </div>
            </div>

            <div>
                <label class="text-[18px] font-bold text-[#333] block mb-3 ml-1">비밀번호</label>
                <div class="input-focus flex items-center border-2 border-gray-100 rounded-[18px] px-5 py-4 bg-white transition-all">
                    <svg class="mr-3" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" placeholder="비밀번호를 입력하세요" class="w-full text-[18px] outline-none placeholder:text-gray-300">
                </div>
            </div>
        </div>

       <div class="mt-16 space-y-4">
            <button onclick="location.href='../seller/seller_home.html'" 
                    class="w-full bg-[#22C55E] text-white py-5 rounded-[18px] text-[22px] font-bold transition-all active:scale-[0.98] shadow-lg">
                로그인
            </button> <div class="mt-16 space-y-4">
            
            
            
            <button onclick="location.href='signup_seller.html'" 
                    class="w-full bg-white text-[#22C55E] border-2 border-[#22C55E] py-5 rounded-[18px] text-[22px] font-bold transition-all active:scale-[0.98]">
                회원가입
            </button>
        </div>
    </div>

</body>
</html>
