<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나눔 플랫폼 키오스크</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; }
        .bg-kiosk {
            background: linear-gradient(180deg, #E9F0FF 0%, #FFFFFF 100%);
        }
        .card-shadow {
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="bg-kiosk min-h-screen">

    <div id="screen-start" class="flex flex-col items-center justify-center min-h-screen w-full px-10">
        <h1 class="text-[64px] font-bold text-[#0047FF] mb-2">나눔 플랫폼 키오스크</h1>
        <p class="text-[32px] text-[#666666] mb-20 font-medium">원하시는 서비스를 선택해주세요</p>

        <div class="flex gap-12 w-full max-w-[1150px] justify-center">
            <button onclick="location.href='auth/login_buyer.html'" class="bg-white w-[500px] py-20 rounded-[48px] card-shadow hover:scale-[1.02] transition-all flex flex-col items-center border border-white">
                <div class="w-48 h-48 bg-[#E9F0FF] rounded-full flex items-center justify-center mb-10">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#0047FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </div>
                <h2 class="text-[52px] font-bold text-[#333333] mb-4">수요자</h2>
                <p class="text-[26px] text-gray-400 text-center leading-tight">필요한 물품을 찾아보<br>세요</p>
            </button>

            <button onclick="location.href='auth/login_seller.html'" class="bg-white w-[500px] py-20 rounded-[48px] card-shadow hover:scale-[1.02] transition-all flex flex-col items-center border border-white">
                <div class="w-48 h-48 bg-[#E8F9F1] rounded-full flex items-center justify-center mb-10">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M20 21c0-4.418-3.582-8-8-8s-8 3.582-8 8"></path>
                    </svg>
                </div>
                <h2 class="text-[52px] font-bold text-[#333333] mb-4">기부자</h2>
                <p class="text-[26px] text-gray-400 text-center leading-tight">나눔 물품을 등록하세<br>요</p>
            </button>
        </div>
    </div>
</body>
</html>
