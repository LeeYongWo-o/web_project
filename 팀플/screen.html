<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나눔 플랫폼 - 홈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.05em; background-color: #F8F9FA; }
        .category-card { transition: all 0.2s; border: 2px solid #E5E7EB; background-color: white; cursor: pointer; }
        .category-card.active { background-color: #0047FF !important; border-color: #0047FF !important; }
        .category-card.active span { color: white !important; }
        .category-card.active svg { stroke: white !important; }
        .item-card { transition: all 0.2s; cursor: pointer; }
        .item-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-8">

    <div class="flex justify-between items-start mb-8">
    <div>
        <h1 class="text-[32px] font-bold text-[#0047FF] mb-1">나눔 플랫폼 키오스크</h1>
        <p class="text-[18px] text-gray-500">안녕하세요, <span class="font-bold text-gray-800">1111</span>님</p>
    </div>
    <div class="flex gap-3">
        <button onclick="location.href='buyer/wanted.html'" 
                class="bg-[#E9F0FF] text-[#0047FF] px-6 py-3 rounded-xl flex items-center gap-2 text-[16px] font-bold shadow-sm hover:bg-[#D6E4FF] active:scale-95 transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            나눔 요청
        </button>

        <button onclick="location.href='buyer/mypage_buyer.html'" 
                class="bg-white border-2 border-gray-100 text-[#333] px-6 py-3 rounded-xl flex items-center gap-2 text-[16px] font-bold shadow-sm active:scale-95 transition-all hover:bg-gray-50">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            마이페이지
        </button>

        <button onclick="location.href='main.html'" 
                class="bg-[#6C757D] text-white px-6 py-3 rounded-xl flex items-center gap-2 text-[16px] font-medium shadow-sm hover:bg-[#5A6268] active:scale-95 transition-all">
            로그아웃
        </button>
    </div>
</div>
    <div class="mb-12">
        <h2 class="text-[24px] font-bold text-[#333] mb-6">카테고리</h2>
        <div class="flex gap-4 overflow-x-auto pb-4">
            <button onclick="filterItems('all', this)" class="category-card min-w-[150px] h-[160px] rounded-[24px] flex flex-col items-center justify-center gap-4 shadow-sm">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span class="text-[18px] font-bold text-gray-600">전체</span>
            </button>
            
            <button id="defaultCategory" onclick="filterItems('digital', this)" class="category-card active min-w-[150px] h-[160px] rounded-[24px] flex flex-col items-center justify-center gap-4 shadow-sm">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
                <span class="text-[18px] font-bold text-gray-600">디지털/가전</span>
            </button>

            <button onclick="filterItems('fashion', this)" class="category-card min-w-[150px] h-[160px] rounded-[24px] flex flex-col items-center justify-center gap-4 shadow-sm">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
                <span class="text-[18px] font-bold text-gray-600">패션/의류</span>
            </button>

            <button onclick="filterItems('furniture', this)" class="category-card min-w-[150px] h-[160px] rounded-[24px] flex flex-col items-center justify-center gap-4 shadow-sm">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18"/><path d="M19 7v10"/><path d="M5 7v10"/></svg>
                <span class="text-[18px] font-bold text-gray-600">가구/인테리어</span>
            </button>

            <button onclick="filterItems('book', this)" class="category-card min-w-[150px] h-[160px] rounded-[24px] flex flex-col items-center justify-center gap-4 shadow-sm">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5V4.5z"/></svg>
                <span class="text-[18px] font-bold text-gray-600">도서</span>
            </button>
        </div>
    </div>

    <div>
        <h2 class="text-[24px] font-bold text-[#333] mb-6">나눔 물품</h2>
        <div id="itemContainer" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            
            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="digital">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">블루투스 헤드셋</h3><p class="text-gray-400">서초동 · 1시간 전</p></div>
            </div>
            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="digital">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">사무용 키보드</h3><p class="text-gray-400">반포동 · 3시간 전</p></div>
            </div>

            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="fashion">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">여름용 반팔 티셔츠</h3><p class="text-gray-400">양재동 · 10분 전</p></div>
            </div>
            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="fashion">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">아동용 운동화</h3><p class="text-gray-400">서초동 · 2시간 전</p></div>
            </div>

            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="furniture">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1544457070-4cd773b4d71e?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">우드 미니 협탁</h3><p class="text-gray-400">방배동 · 5시간 전</p></div>
            </div>
            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="furniture">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">초록색 1인용 소파</h3><p class="text-gray-400">양재동 · 어제</p></div>
            </div>

            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="book">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">자기계발 베스트셀러</h3><p class="text-gray-400">서초동 · 30분 전</p></div>
            </div>
            <div class="item-card bg-white rounded-[28px] overflow-hidden shadow-sm border border-gray-100" data-category="book">
                <div class="h-48 bg-gray-100"><img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=400" class="w-full h-full object-cover"></div>
                <div class="p-5"><h3 class="text-[20px] font-bold text-[#333]">어린이 동화 전집</h3><p class="text-gray-400">반포동 · 4시간 전</p></div>
            </div>

        </div>
    </div>

    <script>
      
        window.onload = function() {
            filterItems('digital', document.getElementById('defaultCategory'));
        };

        function filterItems(category, btn) {
           
            document.querySelectorAll('.category-card').forEach(card => card.classList.remove('active'));
            btn.classList.add('active');

           
            const items = document.querySelectorAll('.item-card');
            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
